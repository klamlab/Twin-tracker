<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ben & Leon Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased">
    <div id="app-container" class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-10">
        <header class="pt-12 pb-4 px-6 bg-white sticky top-0 z-10 border-b border-gray-100">
            <h1 class="text-2xl font-bold">👶 Ben & Leon</h1>
            <p id="sync-status" class="text-xs text-orange-500 mt-1 font-semibold">Verbinde...</p>
        </header>
        <main class="p-4 space-y-6" id="main-content"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCwc_ZLPO8tT6O2J5BUig54gLsFGrgDgHI",
          authDomain: "twins-d6aa3.firebaseapp.com",
          projectId: "twins-d6aa3",
          storageBucket: "twins-d6aa3.firebasestorage.app",
          messagingSenderId: "1001905718243",
          appId: "1:1001905718243:web:bcb49de3c38c2b5a14d6d6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "tracker", "twinsData");

        let data = {
            ben: { name: 'Ben', isSleeping: false, sleepStart: null, events: [], color: 'blue' },
            leon: { name: 'Leon', isSleeping: false, sleepStart: null, events: [], color: 'orange' }
        };

        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                data = docSnap.data();
                document.getElementById('sync-status').innerText = '✅ Live synchronisiert';
                document.getElementById('sync-status').className = 'text-xs text-green-500 mt-1 font-semibold';
                render();
            } else { saveData(); }
        }, (error) => {
            document.getElementById('sync-status').innerText = '❌ Zugriff verweigert';
        });

        // Zentrale Speicherfunktion
        function saveData() { setDoc(docRef, data).catch(e => console.log(e)); }

        // NEU: Funktion zum Nachtragen / Bearbeiten der Zeit
        window.editTime = function(babyId, eventIndex) {
            const event = data[babyId].events[eventIndex];
            const oldDate = new Date(event.time);
            const inputTime = prompt("Uhrzeit anpassen (HH:MM):", oldDate.getHours().toString().padStart(2, '0') + ":" + oldDate.getMinutes().toString().padStart(2, '0'));
            
            if (inputTime) {
                const [hours, minutes] = inputTime.split(':');
                const newDate = new Date(event.time);
                newDate.setHours(parseInt(hours), parseInt(minutes));
                event.time = newDate.getTime();
                // Liste neu sortieren, falls Zeiten verschoben wurden
                data[babyId].events.sort((a, b) => b.time - a.time);
                saveData();
            }
        };

        window.addFeed = function(id) {
            data[id].events.unshift({ type: 'Gefüttert', time: Date.now(), icon: '🍼' });
            saveData();
        };

        window.toggleSleep = function(id) {
            const b = data[id];
            b.isSleeping = !b.isSleeping;
            const now = Date.now();
            b.sleepStart = b.isSleeping ? now : null;
            b.events.unshift({ 
                type: b.isSleeping ? 'Eingeschlafen' : 'Aufgewacht', 
                time: now, 
                icon: b.isSleeping ? '🌙' : '☀️' 
            });
            saveData();
        };

        window.deleteEvent = function(id, index) {
            if(confirm("Eintrag löschen?")) {
                data[id].events.splice(index, 1);
                saveData();
            }
        };

        function render() {
            const main = document.getElementById('main-content');
            main.innerHTML = '';
            ['ben', 'leon'].forEach(id => {
                const b = data[id];
                const feeds = b.events.filter(e => e.type === 'Gefüttert' && new Date(e.time).toDateString() === new Date().toDateString()).length;
                
                main.innerHTML += `
                    <div class="p-5 rounded-3xl mb-4 ${id === 'ben' ? 'bg-blue-50 text-blue-900' : 'bg-orange-50 text-orange-900'}">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-2xl font-bold">${b.name}</h2>
                            <span class="text-xl">${b.isSleeping ? '🌙 Schläft' : '☀️ Wach'}</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 mb-4 text-center text-sm font-semibold">
                            <div class="bg-white p-3 rounded-2xl shadow-sm">🍼 ${feeds} Mahlzeiten</div>
                            <div class="bg-white p-3 rounded-2xl shadow-sm">${b.isSleeping ? 'Seit ' + Math.floor((Date.now()-b.sleepStart)/60000) + 'm' : 'Wach'}</div>
                        </div>

                        <div class="flex gap-2 mb-6">
                            <button onclick="window.toggleSleep('${id}')" class="flex-1 p-4 rounded-2xl bg-gray-800 text-white font-bold active:scale-95 transition-transform">
                                ${b.isSleeping ? '☀️ Aufgewacht' : '🌙 Schlafen'}
                            </button>
                            <button onclick="window.addFeed('${id}')" class="flex-1 p-4 rounded-2xl bg-white border-2 border-gray-200 font-bold active:scale-95 transition-transform">🍼 Füttern</button>
                        </div>

                        <div class="space-y-2">
                            <p class="text-xs font-bold uppercase opacity-50 ml-1">Letzte Aktivitäten</p>
                            ${b.events.slice(0, 4).map((e, idx) => `
                                <div class="bg-white/60 p-3 rounded-xl flex justify-between items-center text-sm">
                                    <span>${e.icon} ${e.type}</span>
                                    <div class="flex items-center gap-3">
                                        <span class="font-mono">${new Date(e.time).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})}</span>
                                        <button onclick="window.editTime('${id}', ${idx})" class="text-gray-400">🕒</button>
                                        <button onclick="window.deleteEvent('${id}', ${idx})" class="text-red-300">✕</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
