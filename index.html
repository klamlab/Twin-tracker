<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ben & Leon Tracker ULTIMATE</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Versteckt den Standard-Input-Style, lässt aber das Rädchen erscheinen */
        input[type="time"]::-webkit-calendar-picker-indicator {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900 antialiased">
    <div id="app-container" class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-10">
        <header class="pt-12 pb-4 px-6 bg-white sticky top-0 z-20 border-b border-gray-100 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold">👶 Ben & Leon</h1>
                <p id="sync-status" class="text-xs text-orange-500 font-semibold">Verbinde...</p>
            </div>
            <button onclick="window.toggleHistory()" class="text-xs bg-gray-800 text-white px-4 py-2 rounded-full font-bold uppercase tracking-wide shadow-md">Archiv</button>
        </header>

        <main class="p-4 space-y-4" id="main-content"></main>
        
        <div id="history-modal" class="hidden fixed inset-0 bg-white z-50 p-4 overflow-y-auto">
            <div class="max-w-md mx-auto">
                <div class="flex justify-between items-center mb-6 sticky top-0 bg-white py-2 z-30">
                    <h2 class="text-2xl font-bold text-gray-800">Historie</h2>
                    <button onclick="window.toggleHistory()" class="bg-gray-100 p-2 rounded-full px-4 font-bold">X</button>
                </div>
                <div id="history-content" class="space-y-6 pb-20"></div>
            </div>
        </div>
    </div>

    <input type="time" id="hidden-time-picker" class="fixed opacity-0 pointer-events-none">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCwc_ZLPO8tT6O2J5BUig54gLsFGrgDgHI",
          authDomain: "twins-d6aa3.firebaseapp.com",
          projectId: "twins-d6aa3",
          storageBucket: "twins-d6aa3.firebasestorage.app",
          messagingSenderId: "1001905718243",
          appId: "1:1001905718243:web:bcb49de3c38c2b5a14d6d6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "tracker", "twinsData");

        let data = {
            ben: { name: 'Ben', isSleeping: false, sleepStart: null, events: [], color: 'blue' },
            leon: { name: 'Leon', isSleeping: false, sleepStart: null, events: [], color: 'orange' }
        };

        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                data = docSnap.data();
                document.getElementById('sync-status').innerText = '✅ Live';
                document.getElementById('sync-status').className = 'text-xs text-green-500 font-semibold';
                render();
                if(!document.getElementById('history-modal').classList.contains('hidden')) renderHistory();
            } else { saveData(); }
        });

        function saveData() { 
            setDoc(docRef, data).catch(e => console.log(e)); 
        }

        window.toggleHistory = function() {
            const modal = document.getElementById('history-modal');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) renderHistory();
        };

        window.addFeed = function(id) {
            data[id].events.unshift({ type: 'Gefüttert', time: Date.now(), icon: '🍼' });
            saveData();
        };

        window.toggleSleep = function(id) {
            const b = data[id];
            b.isSleeping = !b.isSleeping;
            const now = Date.now();
            b.sleepStart = b.isSleeping ? now : null;
            b.events.unshift({ type: b.isSleeping ? 'Eingeschlafen' : 'Aufgewacht', time: now, icon: b.isSleeping ? '🌙' : '☀️' });
            saveData();
        };

        // NEU: Der Roll-Picker
        window.openTimePicker = function(id, eventTime) {
            const picker = document.getElementById('hidden-time-picker');
            const event = data[id].events.find(e => e.time === eventTime);
            const date = new Date(event.time);
            
            // Setzt den Picker auf die aktuelle Event-Zeit
            picker.value = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');
            
            picker.onchange = function() {
                const [h, m] = picker.value.split(':');
                const newDate = new Date(event.time);
                newDate.setHours(h, m);
                event.time = newDate.getTime();
                data[id].events.sort((a, b) => b.time - a.time);
                saveData();
            };
            
            // Öffnet den nativen iPhone Time-Picker
            picker.showPicker();
        };

        window.deleteEvent = function(id, time) {
            if(confirm("Löschen?")) {
                data[id].events = data[id].events.filter(e => e.time !== time);
                saveData();
            }
        };

        function renderHistory() {
            const content = document.getElementById('history-content');
            content.innerHTML = '';
            const allEvents = [];
            ['ben', 'leon'].forEach(id => data[id].events.forEach(e => allEvents.push({...e, babyId: id})));
            allEvents.sort((a,b) => b.time - a.time);

            const months = {};
            allEvents.forEach(e => {
                const m = new Date(e.time).toLocaleDateString('de-DE', {month:'long', year:'numeric'});
                if(!months[m]) months[m] = {};
                const d = new Date(e.time).toLocaleDateString('de-DE', {weekday:'short', day:'2-digit'});
                if(!months[m][d]) months[m][d] = [];
                months[m][d].push(e);
            });

            for(const month in months) {
                let html = `<div class="mb-6"><h3 class="text-lg font-black mb-3 text-gray-800">${month}</h3>`;
                for(const day in months[month]) {
                    html += `<div class="mb-2 bg-gray-50 p-3 rounded-xl">` + 
                    months[month][day].map(e => `
                        <div class="flex justify-between items-center text-sm py-1">
                            <span>${e.babyId === 'ben' ? 'B' : 'L'}: ${e.icon} ${e.type}</span>
                            <div class="flex gap-4">
                                <button onclick="window.openTimePicker('${e.babyId}', ${e.time})" class="font-mono text-blue-500 font-bold">${new Date(e.time).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})}</button>
                                <button onclick="window.deleteEvent('${e.babyId}', ${e.time})" class="text-gray-300">✕</button>
                            </div>
                        </div>
                    `).join('') + `</div>`;
                }
                content.innerHTML += html + `</div>`;
            }
        }

        function render() {
            const main = document.getElementById('main-content');
            main.innerHTML = '';
            ['ben', 'leon'].forEach(id => {
                const b = data[id];
                const today = new Date().toDateString();
                const feeds = b.events.filter(e => e.type === 'Gefüttert' && new Date(e.time).toDateString() === today).length;
                
                main.innerHTML += `
                    <div class="p-6 rounded-[2.5rem] ${id === 'ben' ? 'bg-blue-50 text-blue-900' : 'bg-orange-50 text-orange-900'} shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-black">${b.name}</h2>
                            <div class="px-4 py-1 rounded-full text-xs font-black uppercase ${b.isSleeping ? 'bg-blue-600 text-white' : 'bg-green-500 text-white'}">
                                ${b.isSleeping ? 'Schläft' : 'Wach'}
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-white/80 p-4 rounded-3xl text-center shadow-sm">
                                <span class="text-lg font-black block">🍼 ${feeds}x</span>
                                <span class="text-[10px] uppercase opacity-50">Heute</span>
                            </div>
                            <div class="bg-white/80 p-4 rounded-3xl text-center shadow-sm">
                                <span class="text-lg font-black block">${b.isSleeping ? Math.floor((Date.now()-b.sleepStart)/60000)+'m' : 'Aktiv'}</span>
                                <span class="text-[10px] uppercase opacity-50">Dauer</span>
                            </div>
                        </div>
                        <div class="flex gap-3 mb-6">
                            <button onclick="window.toggleSleep('${id}')" class="flex-1 py-5 rounded-3xl bg-gray-900 text-white font-bold text-lg active:scale-95 shadow-lg">
                                ${b.isSleeping ? 'Wach' : 'Schlaf'}
                            </button>
                            <button onclick="window.addFeed('${id}')" class="flex-1 py-5 rounded-3xl bg-white border-2 border-gray-200 font-bold text-lg active:scale-95 shadow-sm">Füttern</button>
                        </div>
                        <div class="space-y-2">
                            ${b.events.filter(e => new Date(e.time).toDateString() === today).slice(0, 3).map(e => `
                                <div class="bg-white/40 p-3 rounded-2xl flex justify-between items-center text-sm">
                                    <span>${e.icon} ${e.type}</span>
                                    <button onclick="window.openTimePicker('${id}', ${e.time})" class="font-mono text-blue-600 font-bold underline decoration-blue-200">${new Date(e.time).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})}</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
