<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ben & Leon</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/baby.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="time"] {
            border: none; background: transparent; font-family: monospace;
            font-size: 1rem; color: #2563eb; font-weight: bold; width: 70px;
            appearance: none; -webkit-appearance: none;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900 antialiased">
    <div id="app-container" class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-10">
        <header class="pt-12 pb-4 px-6 bg-white sticky top-0 z-20 border-b border-gray-100 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold">👶 Ben & Leon</h1>
                <p id="sync-status" class="text-xs text-orange-500 font-semibold">Verbinde...</p>
            </div>
            <button onclick="window.toggleHistory()" class="text-xs bg-gray-800 text-white px-4 py-2 rounded-full font-bold uppercase shadow-md">Archiv</button>
        </header>
        <main class="p-4 space-y-4" id="main-content"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCwc_ZLPO8tT6O2J5BUig54gLsFGrgDgHI",
          authDomain: "twins-d6aa3.firebaseapp.com",
          projectId: "twins-d6aa3",
          storageBucket: "twins-d6aa3.firebasestorage.app",
          messagingSenderId: "1001905718243",
          appId: "1:1001905718243:web:bcb49de3c38c2b5a14d6d6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "tracker", "twinsData");

        let data = {
            ben: { name: 'Ben', isSleeping: false, sleepStart: null, events: [], color: 'blue' },
            leon: { name: 'Leon', isSleeping: false, sleepStart: null, events: [], color: 'orange' }
        };

        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                data = docSnap.data();
                document.getElementById('sync-status').innerText = '✅ Live';
                document.getElementById('sync-status').className = 'text-xs text-green-500 font-semibold';
                render();
            } else { saveData(); }
        });

        function saveData() { setDoc(docRef, data).catch(e => console.log(e)); }

        window.toggleHistory = function() { /* Archiv Logik */ };

        window.updateTime = function(id, originalTime, newTimeStr) {
            const event = data[id].events.find(e => e.time === originalTime);
            if (!event || !newTimeStr) return;
            const [h, m] = newTimeStr.split(':');
            const d = new Date(event.time);
            d.setHours(h, m);
            event.time = d.getTime();
            data[id].events.sort((a, b) => b.time - a.time);
            saveData();
        };

        window.addFeed = function(id) {
            data[id].events.unshift({ type: 'Gefüttert', time: Date.now(), icon: '🍼' });
            saveData();
        };

        window.toggleSleep = function(id) {
            const b = data[id];
            b.isSleeping = !b.isSleeping;
            const now = Date.now();
            b.sleepStart = b.isSleeping ? now : null;
            b.events.unshift({ type: b.isSleeping ? 'Eingeschlafen' : 'Aufgewacht', time: now, icon: b.isSleeping ? '🌙' : '☀️' });
            saveData();
        };

        function render() {
            const main = document.getElementById('main-content');
            main.innerHTML = '';
            ['ben', 'leon'].forEach(id => {
                const b = data[id];
                const today = new Date().toDateString();
                const feeds = b.events.filter(e => e.type === 'Gefüttert' && new Date(e.time).toDateString() === today).length;
                main.innerHTML += `
                    <div class="p-6 rounded-[2.5rem] ${id === 'ben' ? 'bg-blue-50 text-blue-900' : 'bg-orange-50 text-orange-900'} shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-black">${b.name}</h2>
                            <div class="px-4 py-1 rounded-full text-xs font-black uppercase ${b.isSleeping ? 'bg-blue-600 text-white' : 'bg-green-500 text-white'}">
                                ${b.isSleeping ? 'Schläft' : 'Wach'}
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-white/80 p-4 rounded-3xl text-center shadow-sm font-black">🍼 ${feeds}x</div>
                            <div class="bg-white/80 p-4 rounded-3xl text-center shadow-sm font-black italic">${b.isSleeping ? Math.floor((Date.now()-b.sleepStart)/60000)+'m' : 'Aktiv'}</div>
                        </div>
                        <div class="flex gap-3 mb-6">
                            <button onclick="window.toggleSleep('${id}')" class="flex-1 py-5 rounded-3xl bg-gray-900 text-white font-bold active:scale-95 shadow-lg">${b.isSleeping ? 'Wach' : 'Schlaf'}</button>
                            <button onclick="window.addFeed('${id}')" class="flex-1 py-5 rounded-3xl bg-white border-2 border-gray-200 font-bold active:scale-95 shadow-sm">Füttern</button>
                        </div>
                        <div class="space-y-2">
                            ${b.events.filter(e => new Date(e.time).toDateString() === today).slice(0, 3).map(e => {
                                const t = new Date(e.time).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
                                return `<div class="bg-white/40 p-3 rounded-2xl flex justify-between items-center text-sm">
                                    <span>${e.icon} ${e.type}</span>
                                    <div class="bg-white/60 px-2 py-1 rounded-lg border border-blue-100">
                                        <input type="time" value="${t}" onchange="window.updateTime('${id}', ${e.time}, this.value)">
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
